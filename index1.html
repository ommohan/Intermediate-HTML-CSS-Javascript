<!DOCTYPE html>
<head>
  <meta charset="utf-8">
  <title>To-Do-List</title>
  <link rel="stylesheet" href="style1.css">
  <script src="scripts2.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>


 <form onsubmit="details(event)">
  <input type="text" id="taskInput" placeholder="Enter a task...">
  <button type="button" onclick="addTask()">Add Task</button>

  <br>
  <input type="file" id="ImageInput" placeholder="Enter image URL..." accept="image/*">
  <button type="button" onclick="addImage()">Add Image</button>
  <br><br>

  <ul id="taskList"></ul>
  <div id="imageContainer"></div>



  <input type="email" id="myEmail" placeholder="Email..."><br>
  <input type="text" id="myUsername" placeholder="Username..."><br>
  <input type="password" id="myPassword" placeholder="Password..."><br>
  <input type="submit" value="Submit"><br>

</form>
</body>
<html>
